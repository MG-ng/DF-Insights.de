<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Website{% endblock %}</title>
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">

</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">DF-Insights.de</a>
            <input type="checkbox" id="btnControl"/>
            <label class="btn" for="btnControl">
                <!-- Hamburger menu button -->
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </label >

            <ul class="nav-menu-mobile">
                <a href="{{ url_for('features') }}">
                    <li class="bg-dark bg-gradient text-center fw-bolder
                       p-5 text-light">Features</li></a>
                <a href="{{ url_for('usage') }}">
                    <li class="bg-dark bg-gradient text-center fw-bolder
                       p-5 text-light">Usage</li></a>
                <a href="{{ url_for('about') }}">
                    <li class="bg-dark bg-gradient text-center fw-bolder
                       p-5 text-light">About</li></a>
            </ul>
            <ul class="nav-menu-desktop">
                <li><a href="{{ url_for('features') }}">Features</a></li>
                <li><a href="{{ url_for('usage') }}">Usage</a></li>
                <li><a href="{{ url_for('prediction') }}">Prediction</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content" style="width: 100%">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Created by Markus Gockel, a TUM Student</p>
    </footer>

    <!-- HighCharts -->
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.default.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/script.js') }}"></script>


    <!-- Toastify for Toasts -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</body>
</html>
